all:
  hosts:
    demo-single-node-aarch64:
      ansible_host: 192.0.2.11
  children:
    initial_controller:
      hosts:
        demo-single-node-aarch64:
    controllers:
      hosts:
    workers:
      hosts:
    workers_to_join:
      hosts:
  vars:
    ansible_user: root
    artifacts_dir: "{{ inventory_dir }}/artifacts/demo-single-node-aarch64"
    nixos_flake: "{{ inventory_dir }}/.."
    skip_rook_ceph: true
    cilium_helmrelease_path: "../external/business-operations/kubernetes/base-apps/kube-system/cilium/app/helmrelease.yaml"
    cilium_values_files:
      - "../external/business-operations/kubernetes/base-apps/kube-system/cilium/app/values.yaml"
      - "../external/business-operations/kubernetes/base-apps/kube-system/cilium/app/values-no-dashboards.yaml"
    openebs_helmrelease_path: "../external/business-operations/kubernetes/base-apps/openebs/openebs/app/helmrelease.yaml"
    openebs_values_files:
      - "../external/business-operations/kubernetes/base-apps/openebs/openebs/app/values.yaml"
